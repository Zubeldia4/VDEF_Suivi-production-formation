.step-sep { border-left: 2px solid #e8e7e0; }

  "EN→FR",

  "FR→EN"
];

// Écrase le localStorage si nouvelle version exportée
if(localStorage.getItem(VK)!==DATA_VERSION){
  localStorage.setItem(SK,JSON.stringify(IMPORTED));
  localStorage.setItem(LK,JSON.stringify(IMPORTED_LANGS));
  localStorage.setItem(VK,DATA_VERSION);
}
let state=JSON.parse(localStorage.getItem(SK))||IMPORTED;
let langs=JSON.parse(localStorage.getItem(LK))||IMPORTED_LANGS;

function save(){localStorage.setItem(SK,JSON.stringify(state));}
function saveLg(){localStorage.setItem(LK,JSON.stringify(langs));}

let filter='all';
function pct(row){const v=state.cols.map(c=>W[row.stages[c.id]||'todo']);return Math.round(v.reduce((a,x)=>a+x,0)/v.length*100);}
function rowStatus(row){const s=state.cols.map(c=>row.stages[c.id]||'todo');if(s.includes('blocked'))return 'blocked';if(s.every(x=>x==='done'))return 'done';if(s.some(x=>x==='inprogress'||x==='done'))return 'inprogress';return 'todo';}

function render(){renderHead();renderBody();renderSummary();}

function renderHead(){
  let h1=`<tr><th rowspan="2" style="vertical-align:bottom;padding:12px 10px 9px;text-align:left;border-bottom:2px solid #e8e7e0;white-space:nowrap;min-width:160px">Programme</th>`;
  state.cols.forEach((c,ci)=>{
    const sep=ci>0?'border-left:2px solid #e8e7e0;':'';
    h1+=`<th colspan="2" class="col-group-head" style="background:${c.color};${sep}" draggable="true" ondragstart="colDS(event,${ci})" ondragover="colDO(event,${ci})" ondragleave="colDL(event)" ondrop="colDrop(event,${ci})" ondragend="colDE()">
      <span class="col-drag-handle">⠿</span>${c.emoji} ${c.label}
      <div class="col-actions"><button class="col-btn" onclick="openRename('${c.id}')">✏️</button><button class="col-btn" onclick="delCol('${c.id}')">✕</button></div>
    </th>`;
  });
  h1+=`<th rowspan="2" style="vertical-align:bottom;padding:12px 10px 9px;text-align:center;border-bottom:2px solid #e8e7e0">%</th><th rowspan="2" style="padding:4px;border-bottom:2px solid #e8e7e0"></th></tr>`;
  let h2='<tr>';
  state.cols.forEach((c,ci)=>{const sep=ci>0?'border-left:2px solid #e8e7e0;':'';h2+=`<th class="sub-head" style="background:${c.color};${sep}">Statut</th><th class="sub-head sub-head-file" style="background:${c.color}">Fichier</th>`;});
  h2+='</tr>';
  document.getElementById('thead').innerHTML=h1+h2;
}

function renderBody(){
  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  state.rows.forEach((r,ri)=>{
    if(filter!=='all'&&rowStatus(r)!==filter)return;
    const p=pct(r);
    const allL=langs.includes(r.lang)?langs:[...langs,r.lang];
    const opts=allL.map(l=>`<option${l===r.lang?' selected':''}>${l}</option>`).join('');
    let cells=`<td style="white-space:nowrap">
      <span class="row-drag-handle" draggable="true" ondragstart="rowDS(event,${ri})" ondragover="rowDO(event,${ri})" ondragleave="rowDL(event)" ondrop="rowDrop(event,${ri})" ondragend="rowDE()">⠿</span>
      <span class="prog-name" contenteditable="true" onblur="updateName(${ri},this.textContent.trim())">${r.name}</span>
      <div class="lang-wrap"><select class="lang-select" onchange="updateLang(${ri},this.value)">${opts}</select><button class="btn-lang-mgr" onclick="openLangs(${ri})">⚙️</button></div>
    </td>`;
    state.cols.forEach((c,ci)=>{
      const s=r.stages[c.id]||'todo';const f=r.files[c.id]||{l:'',u:''};
      const sep=ci>0?'border-left:2px solid #e8e7e0;':'';
      const fh=f.l?`<div class="file-wrap"><a class="file-link" href="${f.u}" target="_blank">${FILE_SVG}${f.l}</a><button class="btn-file" onclick="openFile(${ri},'${c.id}')">Modifier</button></div>`:`<button class="btn-file" onclick="openFile(${ri},'${c.id}')">+ Fichier</button>`;
      cells+=`<td style="${sep}"><span class="badge badge-${s}" onclick="toggleStatus(${ri},'${c.id}')">${LABELS[s]}</span></td><td>${fh}</td>`;
    });
    cells+=`<td><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div><div class="pct-label">${p}%</div></div></td><td><button class="btn-del-row" onclick="delRow(${ri})">✕</button></td>`;
    const tr=document.createElement('tr');tr.innerHTML=cells;tbody.appendChild(tr);
  });
}

function renderSummary(){
  const c={done:0,inprogress:0,blocked:0,todo:0};
  state.rows.forEach(r=>c[rowStatus(r)]++);
  document.getElementById('summary').innerHTML=`<div class="summary-card"><div class="num">${state.rows.length}</div><div class="lbl">Programmes</div></div><div class="summary-card"><div class="num" style="color:#2d7a4f">${c.done}</div><div class="lbl">Terminés</div></div><div class="summary-card"><div class="num" style="color:#d4930a">${c.inprogress}</div><div class="lbl">En cours</div></div><div class="summary-card"><div class="num" style="color:#b83220">${c.blocked}</div><div class="lbl">Bloqués</div></div>`;
}

// ── ROW DRAG ─────────────────────────────────────────────────
let rdi=null;
function rowDS(e,ri){rdi=ri;e.dataTransfer.effectAllowed='move';setTimeout(()=>e.target.closest('tr')?.classList.add('row-dragging'),0);}
function rowDO(e,ri){e.preventDefault();if(ri===rdi)return;document.querySelectorAll('#tbody tr').forEach(t=>t.classList.remove('row-drag-over-top','row-drag-over-bottom'));const tr=e.target.closest('tr');if(!tr)return;const mid=tr.getBoundingClientRect().top+tr.getBoundingClientRect().height/2;tr.classList.add(e.clientY<mid?'row-drag-over-top':'row-drag-over-bottom');}
function rowDL(e){e.target.closest('tr')?.classList.remove('row-drag-over-top','row-drag-over-bottom');}
function rowDrop(e,ri){e.preventDefault();if(rdi===null||rdi===ri)return;const tr=e.target.closest('tr');const rect=tr?.getBoundingClientRect();const after=rect?e.clientY>=(rect.top+rect.height/2):false;const rows=[...state.rows];const[moved]=rows.splice(rdi,1);const t=rdi<ri?ri-1:ri;rows.splice(after?t+1:t,0,moved);state.rows=rows;save();render();}
function rowDE(){rdi=null;document.querySelectorAll('#tbody tr').forEach(t=>t.classList.remove('row-dragging','row-drag-over-top','row-drag-over-bottom'));}

// ── COL DRAG ─────────────────────────────────────────────────
let cdi=null;
function colDS(e,ci){cdi=ci;e.dataTransfer.effectAllowed='move';setTimeout(()=>document.querySelectorAll('.col-group-head')[ci]?.classList.add('col-dragging'),0);}
function colDO(e,ci){e.preventDefault();if(ci===cdi)return;document.querySelectorAll('.col-group-head').forEach((th,i)=>th.classList.toggle('col-drag-over',i===ci));}
function colDL(e){e.currentTarget.classList.remove('col-drag-over');}
function colDrop(e,ci){e.preventDefault();if(cdi===null||cdi===ci)return;const cols=[...state.cols];const[moved]=cols.splice(cdi,1);cols.splice(ci,0,moved);state.cols=cols;save();render();}
function colDE(){cdi=null;document.querySelectorAll('.col-group-head').forEach(th=>th.classList.remove('col-dragging','col-drag-over'));}

// ── ACTIONS ──────────────────────────────────────────────────
function toggleStatus(ri,cid){const cur=state.rows[ri].stages[cid]||'todo';state.rows[ri].stages[cid]=STATUSES[(STATUSES.indexOf(cur)+1)%STATUSES.length];save();render();}
function updateName(ri,v){state.rows[ri].name=v;save();renderSummary();}
function updateLang(ri,v){state.rows[ri].lang=v;save();}
function addRow(){const s={},f={};state.cols.forEach(c=>{s[c.id]='todo';f[c.id]={l:'',u:''};});state.rows.push({name:'Nouveau programme',lang:langs[0]||'EN→FR',stages:s,files:f});save();render();}
function delRow(ri){if(confirm(`Supprimer "${state.rows[ri].name}" ?`)){state.rows.splice(ri,1);save();render();}}
function delCol(cid){const col=state.cols.find(c=>c.id===cid);if(confirm(`Supprimer "${col?.label}" ?`)){state.cols=state.cols.filter(c=>c.id!==cid);state.rows.forEach(r=>{delete r.stages[cid];delete r.files[cid];});save();render();}}
function setFilter(f,btn){filter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

// ── MODALS ───────────────────────────────────────────────────
let fileTarget=null;
function openFile(ri,cid){fileTarget={ri,cid};const f=state.rows[ri].files[cid]||{l:'',u:''};document.getElementById('mf-name').value=f.l||'';document.getElementById('mf-url').value=f.u==='#'?'':(f.u||'');openM('m-file');}
function saveFile(){if(!fileTarget)return;const{ri,cid}=fileTarget;state.rows[ri].files[cid]={l:document.getElementById('mf-name').value.trim(),u:document.getElementById('mf-url').value.trim()||'#'};save();closeM('m-file');render();}

let selEmoji=EMOJIS[0],selColor=CLRS[0];
function openAddCol(){selEmoji=EMOJIS[0];selColor=CLRS[0];document.getElementById('mc-name').value='';document.getElementById('mc-emoji').innerHTML=EMOJIS.map(e=>`<span class="emoji-opt${e===selEmoji?' sel':''}" onclick="pickEmoji('${e}',this)">${e}</span>`).join('');document.getElementById('mc-color').innerHTML=CLRS.map(c=>`<div class="color-sw${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join('');openM('m-col');}
function pickEmoji(e,el){selEmoji=e;document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
function pickColor(c,el){selColor=c;document.querySelectorAll('.color-sw').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
function saveCol(){const name=document.getElementById('mc-name').value.trim();if(!name)return;const id='c'+Date.now();state.cols.push({id,label:name,emoji:selEmoji,color:selColor});state.rows.forEach(r=>{r.stages[id]='todo';r.files[id]={l:'',u:''};});save();closeM('m-col');render();}

let renameTarget=null;
function openRename(cid){renameTarget=cid;document.getElementById('mr-name').value=state.cols.find(c=>c.id===cid)?.label||'';openM('m-rename');}
function saveRename(){if(!renameTarget)return;const name=document.getElementById('mr-name').value.trim();if(!name)return;state.cols.find(c=>c.id===renameTarget).label=name;save();closeM('m-rename');render();}

let langRowTarget=null;
function openLangs(ri){langRowTarget=ri;renderLangList();document.getElementById('ml-src').value='';document.getElementById('ml-dst').value='';openM('m-lang');}
function renderLangList(){document.getElementById('ml-list').innerHTML=langs.map(l=>`<div class="lang-item"><span style="font-size:13px">${l}</span><button onclick="deleteLang('${l}')" style="font-size:11px;background:none;border:none;cursor:pointer;color:#c0bfb8;padding:2px 6px;border-radius:4px" onmouseover="this.style.color='#b83220';this.style.background='#fde0de'" onmouseout="this.style.color='#c0bfb8';this.style.background='none'">✕</button></div>`).join('');}
function addLang(){const src=document.getElementById('ml-src').value.trim().toUpperCase();const dst=document.getElementById('ml-dst').value.trim().toUpperCase();if(!src||!dst)return;const l=src+'→'+dst;if(!langs.includes(l)){langs.push(l);saveLg();}if(langRowTarget!==null){state.rows[langRowTarget].lang=l;save();}renderLangList();document.getElementById('ml-src').value='';document.getElementById('ml-dst').value='';render();}
function deleteLang(l){if(state.rows.some(r=>r.lang===l)){alert(`"${l}" est utilisée par un programme.`);return;}langs=langs.filter(x=>x!==l);saveLg();renderLangList();render();}

function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
document.getElementById('mf-url').addEventListener('keydown',e=>{if(e.key==='Enter')saveFile();});
document.getElementById('ml-dst').addEventListener('keydown',e=>{if(e.key==='Enter')addLang();});
document.getElementById('mr-name').addEventListener('keydown',e=>{if(e.key==='Enter')saveRename();});

// ── EXPORT ───────────────────────────────────────────────────
function exportHTML(){
  const newVersion='v'+Date.now();
  const stateStr=JSON.stringify(state,null,2);
  const langsStr=JSON.stringify(langs,null,2);

  // Récupère le contenu du script
  const scriptEl=document.getElementById('main-script');
  let scriptContent=scriptEl.textContent;

  // Injecte les données actuelles
  scriptContent=scriptContent.replace(/const DATA_VERSION='[^']*';/,`const DATA_VERSION='${newVersion}';`);
  scriptContent=scriptContent.replace(/const IMPORTED=\{[\s\S]*?\};\nconst IMPORTED_LANGS=\[[\s\S]*?\];/,`const IMPORTED=${stateStr};\nconst IMPORTED_LANGS=${langsStr};`);

  // Reconstruit le HTML complet
  const css=document.querySelector('style').textContent;
  const bodyClone=document.body.cloneNode(true);
  // Vide thead/tbody car ils sont rendus dynamiquement
  bodyClone.querySelector('#thead').innerHTML='';
  bodyClone.querySelector('#tbody').innerHTML='';
  bodyClone.querySelector('#summary').innerHTML='';

  const html=`<!DOCTYPE html>\n<html lang="fr">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>Suivi production formations</title>\n<style>${css}</style>\n</head>\n${bodyClone.outerHTML.replace(/<script id="main-script">[\s\S]*?<\/script>/,`<script id="main-script">${scriptContent}<\/script>`)}\n</html>`;

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='index.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

render();
</script>
